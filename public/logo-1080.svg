<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Quadrado com cantos arredondados (avatar friendly) -->
  <rect width="1080" height="1080" rx="240" fill="url(#bg)"/>
  <!-- "G" centralizado, gigante, com sombra sutil -->
  <text x="540" y="780"
        text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="780"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-30"
        filter="url(#shadow)">G</text>
  <!-- Linha de "crescimento" embaixo do G (sutil, simboliza gráfico subindo) -->
  <path d="M 320 900 L 480 820 L 620 860 L 760 760"
        stroke="rgba(255,255,255,0.4)" stroke-width="20" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
  <circle cx="760" cy="760" r="22" fill="#ffffff"/>
</svg>
