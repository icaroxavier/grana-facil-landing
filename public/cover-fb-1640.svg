<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 924" width="1640" height="924">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="55%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fundo verde com gradient -->
  <rect width="1640" height="924" fill="url(#bgGrad)"/>

  <!-- Padrão decorativo: círculos sutis -->
  <circle cx="200" cy="200" r="300" fill="#ffffff" opacity="0.04"/>
  <circle cx="1400" cy="800" r="400" fill="#ffffff" opacity="0.04"/>

  <!-- ───── Lado esquerdo: brand ───── -->

  <!-- Logo card -->
  <g transform="translate(120, 200)">
    <rect width="180" height="180" rx="40" fill="url(#logoGrad)"/>
    <text x="90" y="142" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="140" font-weight="900" fill="#ffffff" letter-spacing="-6">G</text>
  </g>

  <!-- "Sua Grana" wordmark -->
  <text x="120" y="460"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Sua Grana</text>

  <!-- Tagline principal -->
  <text x="120" y="540"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="700" fill="#a7f3d0">Veja seu ano financeiro</text>
  <text x="120" y="588"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="700" fill="#a7f3d0">inteiro em uma tela.</text>

  <!-- CTA badge -->
  <g transform="translate(120, 660)">
    <rect width="380" height="58" rx="29" fill="#ffffff"/>
    <text x="190" y="40" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="800" fill="#047857">7 dias grátis · sem cartão</text>
  </g>

  <!-- Site -->
  <text x="120" y="770"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="600" fill="#ffffff" opacity="0.85">suagrana.com</text>

  <!-- ───── Lado direito: mockup do grid ───── -->

  <g transform="translate(880, 180)" filter="url(#cardShadow)">
    <!-- Cartão branco do app -->
    <rect width="660" height="560" rx="24" fill="#ffffff"/>

    <!-- Topbar -->
    <rect x="0" y="0" width="660" height="44" rx="24" fill="#f1f5f9"/>
    <rect x="0" y="22" width="660" height="22" fill="#f1f5f9"/>
    <circle cx="22" cy="22" r="6" fill="#ef4444"/>
    <circle cx="44" cy="22" r="6" fill="#facc15"/>
    <circle cx="66" cy="22" r="6" fill="#10b981"/>
    <text x="100" y="28" font-family="ui-sans-serif" font-size="13" fill="#64748b">app.suagrana.com</text>

    <!-- Header ano -->
    <text x="32" y="90" font-family="ui-sans-serif" font-size="22" font-weight="800" fill="#0f172a">2026</text>

    <!-- Grade — Resumo (Entradas, Saídas, Sobra) -->
    <!-- header da grade -->
    <g transform="translate(32, 110)">
      <rect width="596" height="36" fill="#f8fafc"/>
      <text x="14" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#475569">Resumo</text>
      <text x="180" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">Jun</text>
      <text x="290" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">Jul</text>
      <text x="400" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">···</text>
      <text x="510" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">Dez</text>
      <rect x="556" width="40" height="36" fill="#fef3c7"/>
      <text x="576" y="24" font-family="ui-sans-serif" font-size="13" font-weight="800" fill="#92400e" text-anchor="middle">Ano</text>
    </g>

    <!-- Entradas -->
    <g transform="translate(32, 152)">
      <rect width="596" height="36" fill="#ecfdf5"/>
      <text x="14" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#047857">Entradas</text>
      <text x="180" y="24" font-family="ui-sans-serif" font-size="13" fill="#047857" text-anchor="middle">8.000</text>
      <text x="290" y="24" font-family="ui-sans-serif" font-size="13" fill="#047857" text-anchor="middle">6.500</text>
      <text x="400" y="24" font-family="ui-sans-serif" font-size="13" fill="#047857" text-anchor="middle">···</text>
      <text x="510" y="24" font-family="ui-sans-serif" font-size="13" fill="#047857" text-anchor="middle">13.000</text>
      <rect x="556" width="40" height="36" fill="#fef3c7"/>
      <text x="576" y="24" font-family="ui-sans-serif" font-size="12" font-weight="800" fill="#047857" text-anchor="middle">96k</text>
    </g>

    <!-- Saídas -->
    <g transform="translate(32, 194)">
      <rect width="596" height="36" fill="#fef2f2"/>
      <text x="14" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#b91c1c">Saídas</text>
      <text x="180" y="24" font-family="ui-sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">6.037</text>
      <text x="290" y="24" font-family="ui-sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">7.912</text>
      <text x="400" y="24" font-family="ui-sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">···</text>
      <text x="510" y="24" font-family="ui-sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">5.937</text>
      <rect x="556" width="40" height="36" fill="#fef3c7"/>
      <text x="576" y="24" font-family="ui-sans-serif" font-size="12" font-weight="800" fill="#b91c1c" text-anchor="middle">75k</text>
    </g>

    <!-- Sobra -->
    <g transform="translate(32, 236)">
      <rect width="596" height="36" fill="#f8fafc"/>
      <text x="14" y="24" font-family="ui-sans-serif" font-size="13" font-weight="800" fill="#0f172a">Sobra</text>
      <text x="180" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">1.962</text>
      <text x="290" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">-1.412</text>
      <text x="400" y="24" font-family="ui-sans-serif" font-size="13" fill="#0f172a" text-anchor="middle">···</text>
      <text x="510" y="24" font-family="ui-sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">7.062</text>
      <rect x="556" width="40" height="36" fill="#fde68a"/>
      <text x="576" y="24" font-family="ui-sans-serif" font-size="13" font-weight="900" fill="#047857" text-anchor="middle">21k</text>
    </g>

    <!-- Destaque grande: SOBRA ANUAL -->
    <g transform="translate(32, 310)">
      <rect width="596" height="156" rx="16" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2"/>
      <text x="298" y="58" text-anchor="middle"
            font-family="ui-sans-serif" font-size="18" font-weight="700" fill="#047857">
        💰 Sobra projetada do ano
      </text>
      <text x="298" y="120" text-anchor="middle"
            font-family="ui-sans-serif" font-size="56" font-weight="900" fill="#047857">
        R$ 20.931,40
      </text>
    </g>

    <!-- Footer do mockup -->
    <text x="330" y="510" text-anchor="middle"
          font-family="ui-sans-serif" font-size="13" fill="#64748b">
      Janeiro a Dezembro · uma tela só · sem fórmula
    </text>
  </g>
</svg>
